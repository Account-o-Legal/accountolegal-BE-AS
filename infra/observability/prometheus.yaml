global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI app — exposes /metrics via opentelemetry-exporter-prometheus
  - job_name: accounting-app
    static_configs:
      - targets: ["host.docker.internal:8000"]  # your app
    metrics_path: /metrics

  # OTel Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]